<!DOCTYPE html>
<html>
<head>
  <title>Security Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 { color: #38bdf8; }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .topbar {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .grade-A { color: #22c55e; }
    .grade-B { color: #84cc16; }
    .grade-C { color: #facc15; }
    .grade-F { color: #ef4444; }

    .details {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 8px;
    }

    .high { color: #ef4444; }
    .medium { color: #facc15; }
    .low { color: #22c55e; }

    .summary {
      margin-top: 10px;
      padding: 10px;
      background: #020617;
      border-radius: 6px;
    }

    #loading {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>HTTP Header Scanner</h1>

<div class="topbar">
  <input id="url" placeholder="example.com">
  <button onclick="scan()">Scan</button>

  <input id="search" placeholder="Search..." onkeyup="render()">

  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
    <option value="F">F</option>
  </select>

  <p id="loading"></p>
</div>

<h2>Reports</h2>
<div id="list"></div>

<div id="details" class="details"></div>

<canvas id="chart" width="200"></canvas>

<script>

let reports = [];
let chart = null;

// # LOAD
async function load() {
  const res = await fetch('/reports');
  reports = await res.json();
  render();
}

// # FILTER + SEARCH
function render() {

  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;

  const list = document.getElementById('list');
  list.innerHTML = "";

  reports
    .filter(r => {
      if (filter !== "all" && r.grade !== filter) return false;
      if (!r.url.toLowerCase().includes(search)) return false;
      return true;
    })
    .forEach((r, i) => {

      const div = document.createElement('div');
      div.className = "card";

      div.innerHTML = `
        <b>${r.url}</b><br>
        Grade: <span class="grade-${r.grade}">${r.grade}</span>
        (${r.score})
      `;

      div.onclick = () => showDetails(i);
      list.appendChild(div);
    });
}

// # DETAY + GRAFİK
function showDetails(index) {

  const r = reports[index];

  let high = 0, medium = 0, low = 0;

  let html = `
    <h3>${r.url}</h3>
    <p>Grade: <b class="grade-${r.grade}">${r.grade}</b> (${r.score})</p>
    <hr>
  `;

  r.headers.forEach(h => {

    let sev = h.severity.toLowerCase();

    if (!h.present) {
      if (sev === "high") high++;
      if (sev === "medium") medium++;
      if (sev === "low") low++;
    }

    html += `
      <p>
        ${h.present ? "✅" : "❌"}
        <b>${h.name}</b>
        <span class="${sev}">[${h.severity}]</span><br>
        → ${h.risk}
      </p>
    `;
  });

  html += `
    <div class="summary">
      <b>Top Risk Summary:</b><br>
      HIGH: ${high} <br>
      MEDIUM: ${medium} <br>
      LOW: ${low}
    </div>
  `;

  document.getElementById('details').innerHTML = html;

  // # GRAFİK
  const ctx = document.getElementById('chart');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['HIGH', 'MEDIUM', 'LOW'],
      datasets: [{
        label: 'Risk Distribution',
        data: [high, medium, low]
      }]
    }
  });
}

// # SCAN (LOADING + ERROR)
async function scan() {

  const url = document.getElementById('url').value;
  const loading = document.getElementById('loading');

  if (!url) {
    alert("URL girmen lazım");
    return;
  }

  loading.innerText = "⏳ Scanning...";

  try {
    await fetch('/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url })
    });

    loading.innerText = "✅ Done";
  } catch {
    loading.innerText = "❌ Hata oluştu";
  }

  load();
}

// # INIT
load();

</script>

</body>
</html>
