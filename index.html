<!DOCTYPE html>
<html>
<head>
  <title>Security Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 { color: #38bdf8; }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .secure { color: #22c55e; }
    .risky { color: #ef4444; }

    .details {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 8px;
    }

    .high { color: #ef4444; }
    .medium { color: #facc15; }
    .low { color: #22c55e; }

    #loading { margin-top: 10px; }
  </style>
</head>

<body>

<h1>HTTP Header Scanner</h1>

<input id="url" placeholder="example.com">
<button onclick="scan()">Scan</button>

<input id="search" placeholder="Search / severity..." onkeyup="render()">

<select id="filter" onchange="render()">
  <option value="all">All</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="F">F</option>
</select>

<p id="loading"></p>

<h3 id="count"></h3>

<div id="list"></div>
<div id="details" class="details"></div>
<canvas id="chart"></canvas>

<script>

let reports = [];
let chart = null;

// LOAD
async function load() {
  const res = await fetch('/reports');
  reports = await res.json();

  reports.reverse(); // newest first

  document.getElementById("count").innerText = "Total Reports: " + reports.length;

  render();
}

// FILTER + SEARCH
function render() {

  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;

  const list = document.getElementById('list');
  list.innerHTML = "";

  reports
    .filter(r => {
      if (filter !== "all" && r.grade !== filter) return false;

      if (!r.url.toLowerCase().includes(search) &&
          !r.headers.some(h => h.severity.toLowerCase().includes(search))) return false;

      return true;
    })
    .forEach((r, i) => {

      const div = document.createElement('div');
      div.className = "card";

      div.innerHTML = `
        <b>${r.url}</b><br>
        ${r.grade} (${r.score}) -
        <span class="${r.label === 'Secure' ? 'secure' : 'risky'}">${r.label}</span>
      `;

      div.onclick = () => showDetails(i);
      list.appendChild(div);
    });
}

// DETAY
function showDetails(index) {

  const r = reports[index];

  let high = 0, medium = 0, low = 0;
  let critical = "None";

  let html = `<h3>${r.url}</h3>
  <p>${r.grade} (${r.score}) - ${r.label}</p>
  <hr>`;

  r.headers.forEach(h => {

    if (!h.present && critical === "None") {
      critical = `${h.name} (${h.severity})`;
    }

    let sev = h.severity.toLowerCase();

    if (!h.present) {
      if (sev === "high") high++;
      if (sev === "medium") medium++;
      if (sev === "low") low++;
    }

    html += `
      <p>
        ${h.present ? "✅" : "❌"}
        <b>${h.name}</b>
        <span class="${sev}">[${h.severity}]</span><br>
        → ${h.risk}
      </p>
    `;
  });

  html += `<p><b>Critical Issue:</b> ${critical}</p>`;

  html += `<p>Checked: ${r.headers.length} | Missing: ${high+medium+low}</p>`;

  // score bar
  html += `
    <div style="background:#020617;padding:10px;">
      <div style="width:${r.score}%;background:#38bdf8;height:10px;"></div>
    </div>
  `;

  document.getElementById('details').innerHTML = html;

  // chart
  const ctx = document.getElementById('chart');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['HIGH','MEDIUM','LOW'],
      datasets: [{
        data: [high, medium, low]
      }]
    }
  });
}

// SCAN
async function scan() {

  const url = document.getElementById('url').value;
  const loading = document.getElementById('loading');

  if (!url) {
    loading.innerText = "❌ URL gir";
    return;
  }

  loading.innerText = "⏳ Scanning...";

  try {
    await fetch('/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ url })
    });

    loading.innerText = "✅ Done";
  } catch {
    loading.innerText = "❌ Error";
  }

  load();
}

load();

</script>

</body>
</html>
