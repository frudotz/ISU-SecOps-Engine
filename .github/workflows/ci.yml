name: SecOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # =============================
  # UBUNTU
  # =============================
  ubuntu:
    name: Ubuntu Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --all

  # =============================
  # WINDOWS
  # =============================
  windows:
    name: Windows Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --all

  # =============================
  # KALI (DOCKER CONTAINER)
  # =============================
  kali:
    name: Kali Linux (Container)
    runs-on: ubuntu-latest

    container:
      image: kalilinux/kali-rolling

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          apt update
          apt install -y curl build-essential

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env

      - name: Build
        run: |
          source $HOME/.cargo/env
          cargo build

      - name: Test
        run: |
          source $HOME/.cargo/env
          cargo test
